name: PetClinic Migration & Deployment Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Use environment variables securely injected via GitHub Secret
env:
  ACR_NAME: 'petclinicacr14264'
  IMAGE_NAME: 'petclinic-app'
  AZURE_WEBAPP_NAME: 'petclinic-app-service'
  RESOURCE_GROUP: 'rg-petclinic-migration'

jobs:
  build-and-push:
    name: Build, Scan, and Push Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Speeds up subsequent workflow runs
     
      - name: Build Docker Image
        run: docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} -f docker/Dockerfile.spring-petclinic .

      - name: Image Security Scan (Placeholder)
        run: echo "Simulating Trivy or Azure Defender image vulnerability scan... PASSED."

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Push to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}



  deploy-and-cutover:
    name: Application Deploy & Smoke Test
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        run: |
          echo "Updating Container App with new image..."
          az containerapp update \
            --name petclinic-app \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Application Smoke Test
        run: |
          echo "Waiting for Container App to pull image and initialize..."
          sleep 45
          
          # Fetch the dynamic FQDN of the Container App
          APP_URL=$(az containerapp show --name petclinic-app --resource-group ${{ env.RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)
          
          echo "Testing endpoint: https://$APP_URL"
          curl --fail https://$APP_URL/ || exit 1
          echo "Smoke test passed. App is routing traffic to the migrated database."
