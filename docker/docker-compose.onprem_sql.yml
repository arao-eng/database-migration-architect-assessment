services:
  sqldata:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperSecurePass123!
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql

  eshopweb:
    build: 
      context: ../apps/dotnet-eshop
      dockerfile: ../../docker/Dockerfile.dotnet
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CatalogConnection=Server=sqldata;Database=Microsoft.eShopOnWeb.CatalogDb;User Id=sa;Password=SuperSecurePass123!;TrustServerCertificate=True;
      - ConnectionStrings__IdentityConnection=Server=sqldata;Database=Microsoft.eShopOnWeb.Identity;User Id=sa;Password=SuperSecurePass123!;TrustServerCertificate=True;
      - baseUrls__apiBase=http://eshopweb:80/
      - baseUrls__webBase=http://localhost/
    ports:
      - "8080:80"
    depends_on:
      - sqldata

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - eshopweb

volumes:
  sqlvolume: